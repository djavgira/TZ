services:
  # gRPC server (headless; attach with docker attach for TUI, or run server locally)
  server:
    build:
      context: .
      dockerfile: Dockerfile
    image: tz:latest
    container_name: tz-server
    command: tz server --config /etc/tz/tz.yaml
    ports:
      - "9090:9090"
    environment:
      - TZ_AGENT_HOST_ID=server
      - TZ_LOGGING_FORMAT=text
    networks:
      - tz
    restart: unless-stopped

  agent-a:
    build:
      context: .
      dockerfile: Dockerfile.agent
    image: tz-agent:latest
    container_name: tz-agent-a
    environment:
      - TZ_AGENT_HOST_ID=node-a
      - TZ_GRPC_CLIENT_SERVER_ADDR=server:9090
      - TZ_GRPC_CLIENT_PUSH_INTERVAL=5s
      - TZ_GRPC_CLIENT_INSECURE=true
      - HOST_PROC=/host/proc
      - HOST_SYS=/host/sys
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    pid: "host"
    read_only: true
    tmpfs:
      - /tmp:size=1M,mode=1777
    cap_drop:
      - ALL
    networks:
      - tz
    depends_on:
      - server

  agent-b:
    build:
      context: .
      dockerfile: Dockerfile.agent
    image: tz-agent:latest
    container_name: tz-agent-b
    environment:
      - TZ_AGENT_HOST_ID=node-b
      - TZ_GRPC_CLIENT_SERVER_ADDR=server:9090
      - TZ_GRPC_CLIENT_PUSH_INTERVAL=5s
      - TZ_GRPC_CLIENT_INSECURE=true
      - HOST_PROC=/host/proc
      - HOST_SYS=/host/sys
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    pid: "host"
    read_only: true
    tmpfs:
      - /tmp:size=1M,mode=1777
    cap_drop:
      - ALL
    networks:
      - tz
    depends_on:
      - server

  agent-c:
    build:
      context: .
      dockerfile: Dockerfile.agent
    image: tz-agent:latest
    container_name: tz-agent-c
    environment:
      - TZ_AGENT_HOST_ID=node-c
      - TZ_GRPC_CLIENT_SERVER_ADDR=server:9090
      - TZ_GRPC_CLIENT_PUSH_INTERVAL=5s
      - TZ_GRPC_CLIENT_INSECURE=true
      - HOST_PROC=/host/proc
      - HOST_SYS=/host/sys
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
    pid: "host"
    read_only: true
    tmpfs:
      - /tmp:size=1M,mode=1777
    cap_drop:
      - ALL
    networks:
      - tz
    depends_on:
      - server

  # Optional: Prometheus scraping the serve-mode agent if running
  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./deployments/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9091:9090"
    networks:
      - tz
    profiles:
      - prometheus

networks:
  tz:
    driver: bridge

volumes:
  prometheus_data:
