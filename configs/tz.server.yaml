# tz server mode configuration
# Usage: tz server --config configs/tz.server.yaml

agent:
  host_id: "server"

collectors:
  cpu:
    enabled: false
  memory:
    enabled: false
  disk:
    enabled: false
  network:
    enabled: false

grpc_server:
  # Listen address for incoming agent connections
  listen_addr: ":9090"
  # How long without data before a host is marked stale in the TUI
  stale_timeout: 30s

grpc_client:
  server_addr: "localhost:9090"
  push_interval: 5s
  reconnect_backoff_max: 30s
  insecure: true

server:
  listen_addr: ":9100"

logging:
  level: "info"
  format: "text"
  output: "stdout"
